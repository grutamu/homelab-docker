---
services:
  netbox-postgres:
    container_name: netbox-postgres
    image: postgres:16.13-alpine
    environment:
      POSTGRES_DB: netbox
      POSTGRES_USER: netbox
      POSTGRES_PASSWORD:
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pg_isready", "-q", "-d", "netbox", "-U", "netbox"]
      timeout: 45s
      interval: 10s
      retries: 10   
    volumes:
      - /docker-data/netbox/postgres:/var/lib/postgresql/data
    networks:
      - netbox
     
  netbox-redis:
    container_name: netbox-redis
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping || exit 1"]
    volumes:
      - /docker-data/netbox/redis:/data
    networks:
      - netbox
      
  netbox-server:
    container_name: netbox-server
    image: lscr.io/linuxserver/netbox:v4.5.7-ls343
    environment:
      PGID: "1000"
      PUID: "1000"
      SUPERUSER_EMAIL:
      SUPERUSER_PASSWORD:
      ALLOWED_HOST: netbox.calzone.zone
      DB_NAME: netbox
      DB_USER: netbox
      DB_PASSWORD:
      DB_HOST: netbox-postgres
      DB_PORT: "5432"
      REDIS_HOST: netbox-redis
      REDIS_PORT: "6379"
    restart: unless-stopped
    volumes:
      - /docker-data/netbox/config:/config
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      - netbox-postgres
      - netbox-redis
    labels:
      - "traefik.enable=true"
      - traefik.docker.network=proxy
      - "traefik.http.routers.netbox.rule=Host(`netbox.calzone.zone`)"
      - "traefik.http.routers.netbox.entrypoints=https"
      - "traefik.http.routers.netbox.tls=true"
      - "traefik.http.services.netbox.loadbalancer.server.port=8000"
    networks:
      - proxy
      - netbox

networks:
  proxy:
    external: true
  netbox: