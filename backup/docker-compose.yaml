services:
  backrest:
    build: .
    container_name: backrest
    restart: unless-stopped
    volumes:
      - /docker-data/backrest:/data
      - /docker-data:/source
      - ./scripts:/scripts:ro
      - /etc/localtime:/etc/localtime:ro
      - nfs-backup:/backups
    environment:
      - BACKREST_PORT=9898
      - BACKREST_INSTANCE=docker01
      - IMMICH_DB_USER
      - IMMICH_DB_PASSWORD
      - NETBOX_DB_PASSWORD
      - PAPERLESS_DB_PASSWORD
      - RESTIC_PASSWORD
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.backrest.rule=Host(`backrest.calzone.zone`)"
      - "traefik.http.routers.backrest.entrypoints=https"
      - "traefik.http.routers.backrest.tls=true"
      - "traefik.http.routers.backrest.middlewares=pocket-id-auth@file"
      - "traefik.http.services.backrest.loadbalancer.server.port=9898"
    networks:
      - proxy
      - immich_immich
      - netbox_netbox
      - paperless_paperless

volumes:
  nfs-backup:
    driver_opts:
      type: "nfs"
      o: "addr=truenas.calzone.zone,nolock,soft,nfsvers=4"
      device: ":/mnt/hdd-pool/backups/docker01"

networks:
  proxy:
    external: true
  immich_immich:
    external: true
  netbox_netbox:
    external: true
  paperless_paperless:
    external: true
