global:
  resolve_timeout: 5m

route:
  group_by: ['alertname']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: 'discord'
  routes:
  - receiver: 'null'
    matchers:
    - job = pikiosk
    - alertname =~ "HighMemoryLoad|UnusualMemoryGrowth"

receivers:
- name: 'null'
- name: 'discord'
  webhook_configs:
  - url: 'http://alertmanager-discord:9094'
    send_resolved: true