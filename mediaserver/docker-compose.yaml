    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.bazarr.rule=Host(`bazarr.calzone.zone`)"
      - "traefik.http.routers.bazarr.entrypoints=https"
      - "traefik.http.routers.bazarr.tls=true"
      - "traefik.http.routers.bazarr.middlewares=pocket-id-auth@file"
      - "traefik.http.services.bazarr.loadbalancer.server.port=6767"
    networks:
      - proxy

  tautulli:
    image: lscr.io/linuxserver/tautulli:v2.17.0-ls223
    container_name: tautulli
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
    volumes:
      - /docker-data/tautulli:/config
      - /etc/localtime:/etc/localtime:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.tautulli.rule=Host(`tautulli.calzone.zone`)"
      - "traefik.http.routers.tautulli.entrypoints=https"
      - "traefik.http.routers.tautulli.tls=true"
      - "traefik.http.services.tautulli.loadbalancer.server.port=8181"
    networks:
      - proxy

  maintainerr:
    image: ghcr.io/maintainerr/maintainerr@sha256:bfc9d16c3f752e17432e5a66df5bbeb4c115698f9dd496ee03fd0aa9ef3dca52
    container_name: maintainerr
    restart: unless-stopped
    user: 1000:1000
    volumes:
      - /docker-data/maintainerr:/opt/data
      - /etc/localtime:/etc/localtime:ro
#    environment:
#      - BASE_PATH=/maintainerr # uncomment if you're serving maintainerr from a subdirectory
#      - UI_HOSTNAME=:: # uncomment if you want to listen on IPv6 instead (default 0.0.0.0)
#      - UI_PORT=6247 # uncomment to change the UI port (default 6246). Useful if you're on a network where the port is already in use
#      - API_PORT=3002 # uncomment to change the API port (default 3001). Useful if you're on a network where the port is already in use
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.maintainerr.rule=Host(`maintainerr.calzone.zone`)"
      - "traefik.http.routers.maintainerr.entrypoints=https"
      - "traefik.http.routers.maintainerr.tls=true"
      - "traefik.http.routers.maintainerr.middlewares=pocket-id-auth@file"
      - "traefik.http.services.maintainerr.loadbalancer.server.port=6246"
    networks:
      - proxy

volumes:
  nfs-media:
    driver_opts:
      type: "nfs"
      o: "addr=truenas.calzone.zone,nolock,soft,nfsvers=4"
      device: ":/mnt/hdd-pool/media"

networks:
  proxy:
    external: true
