  prowlarr:
    image: lscr.io/linuxserver/prowlarr:2.3.5.5327-ls141
    container_name: prowlarr
    restart: unless-stopped
    volumes:
      - /docker-data/prowlarr:/config
      - /etc/localtime:/etc/localtime:ro
    environment:
      - PUID=1000
      - PGID=1000
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.prowlarr.rule=Host(`prowlarr.calzone.zone`)"
      - "traefik.http.routers.prowlarr.entrypoints=https"
      - "traefik.http.routers.prowlarr.tls=true"
      - "traefik.http.routers.prowlarr.middlewares=pocket-id-auth@file"
      - "traefik.http.services.prowlarr.loadbalancer.server.port=9696"
    networks:
      - proxy

  seerr:
    image: ghcr.io/seerr-team/seerr:v3.2.0
    init: true
    container_name: seerr
    restart: unless-stopped
    volumes:
      - /docker-data/seerr:/app/config
      - /etc/localtime:/etc/localtime:ro
    environment:
      - LOG_LEVEL=debug
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:5055/api/v1/status || exit 1
      start_period: 20s
      timeout: 3s
      interval: 15s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.seerr.rule=Host(`requests.calzone.zone`)"
      - "traefik.http.routers.seerr.entrypoints=https"
      - "traefik.http.routers.seerr.tls=true"
      - "traefik.http.services.seerr.loadbalancer.server.port=5055"
    networks:
      - proxy

  recyclarr:
