services:
  sabnzbd:
    image: lscr.io/linuxserver/sabnzbd:4.5.5-ls248
    container_name: sabnzbd
    restart: unless-stopped
    volumes:
      - /docker-data/sabnzbd:/config
      - nfs-media:/media
      - /etc/localtime:/etc/localtime:ro
    environment:
      - PUID=1000
      - PGID=1000
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sabnzbd.rule=Host(`sabnzbd.calzone.zone`)"
      - "traefik.http.routers.sabnzbd.entrypoints=https"
      - "traefik.http.routers.sabnzbd.tls=true"
      - "traefik.http.routers.sabnzbd.middlewares=pocket-id-auth@file"
      - "traefik.http.services.sabnzbd.loadbalancer.server.port=8080"
    networks:
      - proxy

  plex:
    image: lscr.io/linuxserver/plex:1.43.1.10576-06378bdcd-ls300
    container_name: plex
    restart: unless-stopped
# Add Configurations for GPU Hardware Rendering Here:
    devices:
      - /dev/dri:/dev/dri
    volumes:
      - /docker-data/plex:/config
      - nfs-media:/media
      - /etc/localtime:/etc/localtime:ro
    environment:
      - PUID=1000
      - PGID=1000
      - VERSION=latest
    ports:
      - "32400:32400"
    networks:
      - proxy

  radarr:
    image: lscr.io/linuxserver/radarr:6.1.1.10360-ls298
    container_name: radarr
    restart: unless-stopped
    volumes:
      - /docker-data/radarr:/config
      - nfs-media:/media
      - /etc/localtime:/etc/localtime:ro
    environment:
      - PUID=1000
      - PGID=1000
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.radarr.rule=Host(`radarr.calzone.zone`)"
      - "traefik.http.routers.radarr.entrypoints=https"
      - "traefik.http.routers.radarr.tls=true"
      - "traefik.http.routers.radarr.middlewares=pocket-id-auth@file"
      - "traefik.http.services.radarr.loadbalancer.server.port=7878"
    networks:
      - proxy

  radarr-4k:
    image: lscr.io/linuxserver/radarr:6.1.1.10360-ls298
    container_name: radarr-4k
    restart: unless-stopped
    volumes:
      - /docker-data/radarr-4k:/config
      - nfs-media:/media
      - /etc/localtime:/etc/localtime:ro
    environment:
      - PUID=1000
      - PGID=1000
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.radarr-4k.rule=Host(`radarr-4k.calzone.zone`)"
      - "traefik.http.routers.radarr-4k.entrypoints=https"
      - "traefik.http.routers.radarr-4k.tls=true"
      - "traefik.http.routers.radarr-4k.middlewares=pocket-id-auth@file"
      - "traefik.http.services.radarr-4k.loadbalancer.server.port=7878"
    networks:
      - proxy

  sonarr:
    image: lscr.io/linuxserver/sonarr:4.0.17.2952-ls306
    container_name: sonarr
    restart: unless-stopped
    volumes:
      - /docker-data/sonarr:/config
      - nfs-media:/media
      - /etc/localtime:/etc/localtime:ro
    environment:
      - PUID=1000
      - PGID=1000
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sonarr.rule=Host(`sonarr.calzone.zone`)"
      - "traefik.http.routers.sonarr.entrypoints=https"
      - "traefik.http.routers.sonarr.tls=true"
      - "traefik.http.routers.sonarr.middlewares=pocket-id-auth@file"
      - "traefik.http.services.sonarr.loadbalancer.server.port=8989"
    networks:
