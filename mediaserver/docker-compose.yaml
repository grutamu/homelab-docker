    container_name: recyclarr
    restart: unless-stopped
    volumes:
      - /docker-data/recyclarr:/config
      - /etc/localtime:/etc/localtime:ro
    networks:
      - proxy

  bazarr:
    image: lscr.io/linuxserver/bazarr:v1.5.6-ls343
    container_name: bazarr
